apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-app
  namespace: devsecops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chaos-app
  template:
    metadata:
      labels:
        app: chaos-app
    spec:
      containers:
        - name: chaos-app
          image: kunj22/chaos-devsecops:18
          ports:
            - containerPort: 5000
